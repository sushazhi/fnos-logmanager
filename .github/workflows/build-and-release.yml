name: Build and Release LogManager for fnOS

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build LogManager
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from manifest
        run: |
          APP_VERSION=$(grep '^version[[:space:]]*=' manifest | sed 's/^version[[:space:]]*=[[:space:]]*//' | tr -d '[:space:]')
          if [ -z "$APP_VERSION" ]; then
            echo "ERROR: Failed to read version from manifest"
            exit 1
          fi
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          echo "APP_VERSION=${APP_VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Inject version into source files
        run: |
          APP_HEADER="app/ui/src/components/AppHeader.vue"
          USE_UPDATE="app/ui/src/stores/useUpdateStore.ts"

          if [ -f "$APP_HEADER" ]; then
            sed -i "s/__APP_VERSION__/${APP_VERSION}/g" "$APP_HEADER"
            echo "Version ${APP_VERSION} injected into AppHeader.vue"
          fi

          if [ -f "$USE_UPDATE" ]; then
            sed -i "s/__APP_VERSION__/${APP_VERSION}/g" "$USE_UPDATE"
            echo "Version ${APP_VERSION} injected into useUpdateStore.ts"
          fi

          # Verify no placeholder remains
          if grep -rq '__APP_VERSION__' app/ui/src/; then
            echo "ERROR: __APP_VERSION__ placeholder still exists in source files"
            grep -rn '__APP_VERSION__' app/ui/src/
            exit 1
          fi

          # Generate version.json with current build version
          echo "{\"version\":\"${APP_VERSION}\"}" > version.json
          echo "version.json generated: $(cat version.json)"

      - name: Commit version.json to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          if git diff --cached --quiet; then
            echo "version.json unchanged, skipping commit"
          else
            git commit -m "chore: update version.json to ${APP_VERSION} [skip ci]"
            git push origin HEAD:main
            echo "version.json committed and pushed to main"
          fi

      - name: Build Vue frontend
        run: |
          cd app/ui
          npm install
          npm run build

      - name: Verify Vue build
        run: |
          if [ ! -d "app/ui/dist" ]; then
            echo "ERROR: Vue build output not found"
            exit 1
          fi
          echo "Vue build complete"
          ls -la app/ui/dist/

      - name: Install server dependencies
        run: |
          cd app/server
          npm install
          echo "Server dependencies installed"

      - name: Compile TypeScript
        run: |
          cd app/server
          npx tsc
          echo "TypeScript compiled"

      - name: Verify TypeScript build
        run: |
          if [ ! -f "app/server/dist/server.js" ]; then
            echo "ERROR: TypeScript build output not found"
            exit 1
          fi
          echo "TypeScript build complete"
          ls -la app/server/dist/

      - name: Download fnpack
        run: |
          FNPACK_URL="https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64"
          wget -q "$FNPACK_URL" -O fnpack
          if [ ! -s fnpack ]; then
            echo "ERROR: fnpack download failed or file is empty"
            exit 1
          fi
          chmod +x fnpack
          echo "fnpack downloaded ($(stat -c%s fnpack) bytes)"

      - name: Setup build directory
        run: |
          # Mirror build.ps1 [1/5]: clean and recreate build directory
          echo "Setting up build directory..."
          mkdir -p build/app/ui
          mkdir -p build/app/server
          mkdir -p build/cmd
          mkdir -p build/config
          mkdir -p build/wizard

      - name: Copy project files to build directory
        run: |
          # Mirror build.ps1 [3/5]: copy all project files

          # Root files
          cp -r cmd/* build/cmd/
          cp -r config/* build/config/
          cp -r wizard/* build/wizard/

          # Inject version into build manifest (mirror build.ps1 manifest update)
          sed "s/^version[[:space:]]*=.*/version = ${APP_VERSION}/" manifest > build/manifest

          for file in LICENSE ICON.PNG ICON_256.PNG; do
            if [ -f "$file" ]; then cp "$file" build/; fi
          done

          # Vue build output
          cp -r app/ui/dist/* build/app/ui/
          if [ -f "app/ui/config" ]; then cp -r app/ui/config build/app/ui/; fi
          if [ -d "app/ui/images" ]; then cp -r app/ui/images build/app/ui/; fi
          if [ -f "app/ui/router.cgi" ]; then cp "app/ui/router.cgi" build/app/ui/; fi

          echo "Project files copied"

      - name: Copy compiled server files
        run: |
          # Mirror build.ps1 [4/5]: copy compiled TypeScript output
          cp app/server/dist/server.js build/app/server/
          cp app/server/package.json build/app/server/

          for subdir in utils middleware services routes types notify errors; do
            if [ -d "app/server/dist/$subdir" ]; then
              cp -r "app/server/dist/$subdir" "build/app/server/$subdir"
              echo "  Copied $subdir/"
            fi
          done

          echo "Server files copied"

      - name: Create .fpk package
        run: |
          # Mirror build.ps1 [5/5]: run fnpack build
          cd build
          ../fnpack build .

          if [ ! -f "logmanager.fpk" ]; then
            echo "ERROR: fnpack did not generate logmanager.fpk"
            exit 1
          fi

          PACKAGE_NAME="logmanager-${APP_VERSION}.fpk"
          mv logmanager.fpk "../${PACKAGE_NAME}"
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_ENV
          echo "Created package: ${PACKAGE_NAME}"
          ls -lh "../${PACKAGE_NAME}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LogManager-fpk
          path: ${{ env.PACKAGE_NAME }}
          retention-days: 30

      - name: Build summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## ✅ Build Summary

          **Version:** ${{ env.APP_VERSION }}

          **Git Info:**
          - Commit: \`${{ github.sha }}\`
          - Branch: \`${{ github.ref_name }}\`
          - Triggered by: ${{ github.event_name }}

          **Build Artifacts:**
          - Package: \`${PACKAGE_NAME}\`
          EOF

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${{ github.ref_name }}"
          CHANGELOG=$(grep '^changelog[[:space:]]*=' manifest | sed 's/^changelog[[:space:]]*=[[:space:]]*//' | sed 's/<br>/\n/g')

          gh release create "$TAG" \
            "${PACKAGE_NAME}" \
            --title "$TAG" \
            --notes "$CHANGELOG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
